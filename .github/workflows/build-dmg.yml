name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view v0.01 --repo "${{ github.repository }}" 2>/dev/null || \
          gh release create v0.01 \
            --repo "${{ github.repository }}" \
            --title "Cube Craft v0.01" \
            --notes "" \
            --latest

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_cmd: CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --mac --publish never
            artifact: dist/*.dmg
          - os: windows-latest
            build_cmd: npx electron-builder --win --publish never
            artifact: dist/*.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload v0.01 ${{ matrix.artifact }} --clobber --repo "${{ github.repository }}"
