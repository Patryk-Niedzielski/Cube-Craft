name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_cmd: CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --mac --publish never
            artifact: dist/*.dmg
          - os: windows-latest
            build_cmd: npx electron-builder --win --publish never
            artifact: dist/*.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Upload to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v0.01
          name: "Cube Craft v0.01"
          body: |
            **Cube Craft v0.01** — automatically updated on every push to main.

            ### Install
            - **macOS:** Download `Cube Craft-0.0.1-universal.dmg`, open it and drag to Applications. First launch: right-click → Open (unsigned app)
            - **Windows:** Download `Cube Craft Setup 0.0.1.exe` and run the installer
          artifacts: ${{ matrix.artifact }}
          artifactContentType: application/octet-stream
          allowUpdates: true
          omitBodyDuringUpdate: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
